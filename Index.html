<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPM Silenciadores | Catálogo Virtual</title>
    <script>
        // Redirigir inmediatamente a FrontEnd/Index.html
        window.location.href = 'FrontEnd/Index.html';
    </script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #241e23;
            color: #66ba45;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            border: 4px solid #cbcaca;
            border-top: 4px solid #66ba45;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #66ba45;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2>RPM Silenciadores</h2>
        <p>Cargando catálogo...</p>
        <p>Si no se redirige automáticamente, <a href="FrontEnd/Index.html">haz clic aquí</a></p>
    </div>
</body>
</html>
